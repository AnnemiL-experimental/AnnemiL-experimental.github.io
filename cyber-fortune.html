function pickFortune(skill, diff, success, question) {
  const pool = FORTUNES[skill.name];
  if (!pool) return "……信号丢失了。";
  const variants = success ? pool.success : pool.failure;
  const template = variants[Math.floor(Math.random() * variants.length)];
  // Truncate question for display inside the fortune text
  const q = question.length > 20 ? question.slice(0, 20) + "..." : question;
  return template.replace(/\{diff\}/g, diff).replace(/\{q\}/g, q);
}

// ── GammaCanvas ─────────────────────────────────────────────────────
function GammaCanvas({ active }) {
  const canvasRef = useRef(null);
  const animRef  = useRef(null);
  const timeRef  = useRef(0);

  useEffect(() => {
    const canvas = canvasRef.current;
    if (!canvas) return;
    const ctx = canvas.getContext("2d");
    const dpr = window.devicePixelRatio || 1;

    const resize = () => {
      canvas.width  = canvas.offsetWidth  * dpr;
      canvas.height = canvas.offsetHeight * dpr;
      // Reset transform before re-applying scale (fixes accumulation bug)
      ctx.setTransform(1, 0, 0, 1, 0, 0);
      ctx.scale(dpr, dpr);
    };
    resize();
    window.addEventListener("resize", resize);

    const draw = () => {
      const w = canvas.offsetWidth;
      const h = canvas.offsetHeight;
      ctx.clearRect(0, 0, w, h);

      const numWaves = 5;
      const gamma = 40;
      timeRef.current += 0.016;
      const t = timeRef.current;

      for (let i = 0; i < numWaves; i++) {
        const amp   = active ? 12 + i * 6  : 4 + i * 2;
        const freq  = gamma * (0.8 + i * 0.15);
        const alpha = active ? 0.15 + i * 0.08 : 0.06 + i * 0.03;
        const yOff  = h * 0.3 + i * (h * 0.1);
        const hue   = 260 + i * 25;

        ctx.beginPath();
        ctx.strokeStyle = `hsla(${hue}, 80%, 70%, ${alpha})`;
        ctx.lineWidth   = 1.5;

        for (let x = 0; x < w; x += 2) {
          const progress = x / w;
          const envelope = Math.sin(progress * Math.PI);
          const noise    = Math.sin(x * 0.01 + t * 2 + i) * 3;
          const y = yOff + Math.sin(progress * freq + t * (4 + i * 0.5)) * amp * envelope + noise;
          if (x === 0) ctx.moveTo(x, y);
          else ctx.lineTo(x, y);
        }
        ctx.stroke();
      }

      if (active) {
        for (let i = 0; i < 3; i++) {
          const x = (Math.sin(t * 1.3 + i * 2.1) * 0.5 + 0.5) * w;
          const y = (Math.cos(t * 0.9 + i * 1.7) * 0.5 + 0.5) * h;
          const grad = ctx.createRadialGradient(x, y, 0, x, y, 80);
          grad.addColorStop(0, `hsla(${270 + i * 40}, 80%, 60%, 0.06)`);
          grad.addColorStop(1, "transparent");
          ctx.fillStyle = grad;
          ctx.fillRect(0, 0, w, h);
        }
      }

      animRef.current = requestAnimationFrame(draw);
    };
    draw();

    return () => {
      window.removeEventListener("resize", resize);
      cancelAnimationFrame(animRef.current);
    };
  }, [active]);

  return (
    <canvas
      ref={canvasRef}
      style={{
        position: "absolute", inset: 0,
        width: "100%", height: "100%",
        pointerEvents: "none",
      }}
    />
  );
}

// ── DiceRoll ────────────────────────────────────────────────────────
function DiceRoll({ result, onComplete }) {
  const [current, setCurrent] = useState(0);
  const [phase, setPhase]     = useState("rolling");
  const rollCount = useRef(0);

  useEffect(() => {
    if (phase !== "rolling") return;
    const interval = setInterval(() => {
      setCurrent(Math.floor(Math.random() * 12) + 1);
      rollCount.current++;
      if (rollCount.current > 15) {
        clearInterval(interval);
        setCurrent(result);
        setPhase("done");
        setTimeout(onComplete, 600);
      }
    }, 80);
    return () => clearInterval(interval);
  }, [phase, result, onComplete]);

  return (
    <div style={{
      display: "flex", alignItems: "center", justifyContent: "center",
      gap: 16, margin: "20px 0",
    }}>
      <div style={{
        width: 64, height: 64,
        border: "2px solid rgba(179,136,255,0.6)",
        borderRadius: 8,
        display: "flex", alignItems: "center", justifyContent: "center",
        fontSize: 28,
        fontFamily: "'EB Garamond', Georgia, serif",
        color: phase === "done" ? (result >= 6 ? "#81c784" : "#ff6f61") : "#b388ff",
        background: "rgba(20,10,30,0.6)",
        transition: "color 0.3s",
        fontWeight: 700,
      }}>
        {current || "?"}
      </div>
    </div>
  );
}

// ── TypeWriter ──────────────────────────────────────────────────────
function TypeWriter({ text, speed = 25, onDone }) {
  const [displayed, setDisplayed] = useState("");
  const idx = useRef(0);

  useEffect(() => {
    idx.current = 0;
    setDisplayed("");
  }, [text]);

  useEffect(() => {
    if (idx.current < text.length) {
      const timer = setTimeout(() => {
        idx.current++;
        setDisplayed(text.slice(0, idx.current));
        if (idx.current >= text.length && onDone) onDone();
      }, speed);
      return () => clearTimeout(timer);
    }
  }, [displayed, text, speed, onDone]);

  return (
    <span>
      {displayed}
      <span style={{
        opacity: displayed.length < text.length ? 1 : 0,
        transition: "opacity 0.3s",
      }}>&#9612;</span>
    </span>
  );
}

    setDifficulty(diff);
    setDiceResult(roll);
    setPassed(success);

    setPhase("selecting");

    setFortune(text);
    setPhase("revealing");

    setQuestion("");
    setSelectedSkill(null);
    setFortune("");

      fontFamily: "'EB Garamond', 'Noto Serif SC', Georgia, serif",
    }}>
      <GammaCanvas active={phase !== "idle"} />

      <div style={{
        position: "relative", zIndex: 1,
        maxWidth: 560, margin: "0 auto",
        padding: "80px 24px 60px",
      }}>
        {/* Title */}
        <div style={{ textAlign: "center", marginBottom: 48 }}>
          <div style={{
            fontSize: 11, letterSpacing: 6,
            color: "rgba(179,136,255,0.5)",
            textTransform: "uppercase", marginBottom: 12,
          }}>
            Gamma Wave Divination System
          </div>
          <h1 style={{
            fontSize: 36, color: "#e8dff0", margin: 0,
            fontWeight: 700, letterSpacing: 2,
          }}>
            赛博算命
          </h1>
          <div style={{
            width: 60, height: 1,
            background: "linear-gradient(90deg, transparent, #b388ff, transparent)",
            margin: "16px auto",
          }} />
          <p style={{
            color: "rgba(200,180,220,0.5)", fontSize: 13,
            margin: 0, fontStyle: "italic",
          }}>
            skill check your destiny
          </p>
        </div>

        {/* ── Idle: Question Input ── */}
        {phase === "idle" && (
          <div style={{ animation: "fadeIn 0.5s ease" }}>
            <div style={{
              background: "rgba(20,10,40,0.5)",
              border: "1px solid rgba(179,136,255,0.15)",
              borderRadius: 12, padding: 24,
              backdropFilter: "blur(10px)",
            }}>
              <label style={{
                display: "block", fontSize: 13,
                color: "rgba(179,136,255,0.7)",
                marginBottom: 10, letterSpacing: 1,
              }}>
                向以太提问
              </label>
              <textarea
                value={question}
                onChange={e => setQuestion(e.target.value)}
                placeholder="今天的实验数据会不会好看？我的猫会原谅我出门吗？..."
                onKeyDown={e => {
                  if (e.key === "Enter" && !e.shiftKey) {
                    e.preventDefault();
                    handleAsk();
                  }
                }}
                style={{
                  width: "100%", minHeight: 80,
                  background: "rgba(10,5,20,0.6)",
                  border: "1px solid rgba(179,136,255,0.2)",
                  borderRadius: 8, color: "#e0d6ec",
                  fontSize: 16,
                  fontFamily: "'Noto Serif SC', serif",
                  padding: 14, resize: "none", outline: "none",
                  boxSizing: "border-box",
                }}
              />
              <button
                onClick={handleAsk}
                disabled={!question.trim()}
                style={{
                  marginTop: 14, width: "100%", padding: "12px 0",
                  background: question.trim()
                    ? "rgba(179,136,255,0.15)"
                    : "rgba(60,40,80,0.2)",
                  border: `1px solid ${
                    question.trim()
                      ? "rgba(179,136,255,0.4)"
                      : "rgba(100,80,120,0.2)"
                  }`,
                  borderRadius: 8,
                  color: question.trim()
                    ? "#c9b8e8"
                    : "rgba(160,140,180,0.3)",
                  fontSize: 15,
                  fontFamily: "'EB Garamond', serif",
                  letterSpacing: 2,
                  cursor: question.trim() ? "pointer" : "default",
                  transition: "all 0.3s",
                }}
              >
                掷骰
              </button>
            </div>
          </div>
        )}

        {/* ── Selecting: Skill reveal ── */}
        {phase === "selecting" && selectedSkill && (
          <div style={{ textAlign: "center", animation: "fadeIn 0.4s ease" }}>
            <div style={cardStyle(selectedSkill)}>
              <div style={{
                fontSize: 12, color: "rgba(200,180,220,0.5)",
                letterSpacing: 3, marginBottom: 8,
              }}>
                技能激活
              </div>
              <div style={{
                fontSize: 28, color: selectedSkill.color,
                fontWeight: 700, marginBottom: 4,
              }}>
                {selectedSkill.name}
              </div>
              <div style={{
                fontSize: 14, color: "rgba(200,180,220,0.4)",
                fontStyle: "italic",
              }}>
                {selectedSkill.en}
              </div>
              <div style={{
                margin: "16px auto", width: 40, height: 1,
                background: `linear-gradient(90deg, transparent, ${selectedSkill.color}66, transparent)`,
              }} />
              <div style={{ fontSize: 13, color: "rgba(200,180,220,0.6)" }}>
                {selectedSkill.desc}
              </div>
              <div style={{
                marginTop: 16, fontSize: 14,
                color: "rgba(255,255,255,0.5)",
              }}>
                难度：<span style={{ color: selectedSkill.color }}>{difficulty}</span>
              </div>
            </div>
          </div>
        )}

        {/* ── Rolling: Dice animation ── */}
        {phase === "rolling" && selectedSkill && (
          <div style={{ textAlign: "center", animation: "fadeIn 0.3s ease" }}>
            <div style={cardStyle(selectedSkill)}>
              <div style={{
                fontSize: 16, color: selectedSkill.color,
                fontWeight: 700, marginBottom: 4,
              }}>
                {selectedSkill.name}
              </div>
              <div style={{
                fontSize: 12, color: "rgba(200,180,220,0.4)",
                marginBottom: 12,
              }}>
                难度：{difficulty}
              </div>
              <DiceRoll result={diceResult} onComplete={handleRollComplete} />
            </div>
          </div>
        )}

        {/* ── Revealing / Done: Fortune text ── */}
        {(phase === "revealing" || phase === "done") && selectedSkill && (
          <div style={{ animation: "fadeIn 0.5s ease" }}>
            <div style={cardStyle(selectedSkill)}>
              {/* Header */}
              <div style={{
                display: "flex", alignItems: "center",
                gap: 12, marginBottom: 16,
              }}>
                <div style={{
                  width: 36, height: 36, borderRadius: "50%",
                  background: `${selectedSkill.color}22`,
                  border: `1.5px solid ${selectedSkill.color}55`,
                  display: "flex", alignItems: "center", justifyContent: "center",
                  fontSize: 14, color: selectedSkill.color, fontWeight: 700,
                }}>
                  {diceResult}
                </div>
                <div>
                  <div style={{
                    fontSize: 16, color: selectedSkill.color, fontWeight: 700,
                  }}>
                    {selectedSkill.name}
                  </div>
                  <div style={{
                    fontSize: 11, letterSpacing: 1,
                    color: passed
                      ? "rgba(129,199,132,0.7)"
                      : "rgba(255,111,97,0.7)",
                  }}>
                    {difficulty} &middot; {passed ? "成功" : "失败"}
                  </div>
                </div>
              </div>

              {/* Question echo */}
              <div style={{
                fontSize: 13, color: "rgba(200,180,220,0.35)",
                fontStyle: "italic", marginBottom: 16,
                paddingBottom: 16,
                borderBottom: "1px solid rgba(179,136,255,0.08)",
              }}>
                &laquo;{question}&raquo;
              </div>

              {/* Fortune text */}
              <div style={{
                fontSize: 16, lineHeight: 1.8,
                color: "#dcd0ec", minHeight: 80,
                whiteSpace: "pre-wrap",
              }}>
                {fortune ? (
                  <TypeWriter text={fortune} speed={30} onDone={() => setPhase("done")} />
                ) : null}
              </div>

              {/* Reset */}
              {phase === "done" && (
                <button
                  onClick={reset}
                  style={{
                    marginTop: 24, width: "100%", padding: "11px 0",
                    background: "rgba(179,136,255,0.08)",
                    border: "1px solid rgba(179,136,255,0.2)",
                    borderRadius: 8,
                    color: "rgba(179,136,255,0.6)",
                    fontSize: 14,
                    fontFamily: "'EB Garamond', serif",
                    letterSpacing: 2, cursor: "pointer",
                  }}
                >
                  再问一卦
                </button>
              )}
            </div>
          </div>
        )}
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<CyberFortune />);
  </script>
</body>
</html>
